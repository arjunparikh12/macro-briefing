name: Daily Briefing

on:
  schedule:
    # 10:00 UTC = 6 AM ET (EDT) / 5 AM ET (EST). Mon–Fri.
    # GitHub cron is UTC-only and ignores DST. Run at both 10:00 and 11:00
    # so we hit ~06:00 ET year-round; the script no-ops if today's file exists.
    - cron: "0 10 * * 1-5"
    - cron: "0 11 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "Overwrite today's briefing if it already exists"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate briefing
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python generate.py --force
          else
            python generate.py
          fi

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/ data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "briefing: $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
