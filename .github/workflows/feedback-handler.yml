name: Feedback Handler

on:
  repository_dispatch:
    types: [feedback]

permissions:
  contents: write

concurrency:
  group: feedback-handler
  cancel-in-progress: false

jobs:
  append:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Append feedback to data/feedback.json
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: |
          python3 - <<'PY'
          import json, os, re
          from pathlib import Path

          payload = json.loads(os.environ["PAYLOAD"])
          briefing_id = str(payload.get("briefing_id", "")).strip()
          if not re.match(r"^\d{4}-\d{2}-\d{2}$", briefing_id):
              raise SystemExit(f"Invalid briefing_id: {briefing_id!r}")

          rating = payload.get("rating")
          if rating not in ("up", "down", None):
              rating = None

          entry = {
              "rating":  rating,
              "note":    str(payload.get("note", ""))[:1000],
              "section": str(payload.get("section", ""))[:200],
              "user_id": str(payload.get("user_id", "anon"))[:64],
              "ts":      str(payload.get("ts", ""))[:32],
          }

          path = Path("data/feedback.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          data = {}
          if path.exists():
              try:
                  data = json.loads(path.read_text())
              except Exception:
                  data = {}

          existing = data.get(briefing_id, [])
          # Replace prior feedback for the same (section, user_id) pair, otherwise append
          filtered = [
              e for e in existing
              if not (e.get("section") == entry["section"] and e.get("user_id") == entry["user_id"])
          ]
          filtered.append(entry)
          data[briefing_id] = filtered

          path.write_text(json.dumps(data, indent=2, ensure_ascii=False))
          print(f"Appended feedback for {briefing_id} / section={entry['section']!r} user={entry['user_id']!r}")
          PY

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feedback.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "feedback: ${{ github.event.client_payload.briefing_id }} [skip ci]"
            git push
          fi
