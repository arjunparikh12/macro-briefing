# house_view_cb.yaml — Central Bank analyst regime read ONLY.
#
# Correctness overhaul (2026-06-17): every previously-listed numeric anchor
# (policy_rate, last_move, next_meeting, terminal_anchor) was a hardcoded
# fabrication that the briefing rendered as if it were live data. They are
# all removed. The Central Bank Watch section now derives:
#   - Policy rate (Fed) from FRED DFEDTARU/DFEDTARL.
#   - Last move / next meeting from `cb_calendar.yaml` (user-maintained,
#     with a `last_verified` date the renderer checks for freshness).
#   - Terminal anchor: not a fact — dropped.
#   - Regime read: the analyst-view one-liner below, prefixed
#     `_Analyst view:_` so it is unambiguously prose, not data.

Fed:
  regime_read: "Restrictive hold with dovish drift; first cut delivered if labour softens through Aug NFP."

ECB:
  regime_read: "End-of-cycle hold; balance of risks favours patience while wages cool."

BOE:
  regime_read: "Gradual easing with services CPI sticky; cuts come in measured 25 bp steps."

BOJ:
  regime_read: "Cautious normalisation; FX weakness vs USD is the political/inflation pressure point."
